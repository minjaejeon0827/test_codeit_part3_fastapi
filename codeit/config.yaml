settings:  # 프로젝트
    verbose: False  # 실행 중 상세 로그 출력 여부 (True 시 자세한 로그 출력)
    project_root: ""  # 프로젝트 루트 경로 (비워두면 현재 디렉토리 기준)

data:  # 데이터
    folder_path: "data/raw/files"  # 원본 문서가 저장된 폴더 경로
    data_list_path: "data/processed/data_list.csv"  # 처리할 파일 목록 CSV 경로
    top_k: 5  # 검색 시 최대 반환할 문서 수 (1~100 사이 권장)
    file_type: "all"  # 처리할 파일 형식: "pdf", "hwp", 또는 "all"
    apply_ocr: False  # OCR 적용 여부 (True 시 이미지 기반 문서에서 텍스트 추출)
    splitter: "section"  # 문서 분할 방식: "section"(목차 기반), "recursive", "token"
    chunk_size: 1000  # 분할된 텍스트 청크의 최대 길이 (토큰 또는 문자 단위)
    chunk_overlap: 250  # 청크 간 중첩 길이 (정보 손실 방지용)

embedding:  # 임베딩
    embed_type: "openai"                       # 제공업체: "openai", "huggingface", "ollama", "gemini" 등.
    embed_name: "text-embedding-3-large"       # 모델 이름: HuggingFace 모델명 (예: "nlpai-lab/KoE5", "nomic-embed-text", "gemini-embedding-001")
    # TODO: embed_dimension 필요 시 사용 예정(2026.06.15 minjae)
    # embed_dimension: 768                  # (선택) MRL로 차원 축소 시
    vector_store_type: "faiss"                 # 벡터 DB 종류: "faiss" 또는 "chroma"
    vector_store_path: "data/vector_store"     # 벡터 DB 저장 경로

retriever:  # 검색기
    search_type: "hybrid"  # 검색 방식: "similarity" 또는 "hybrid"(유사도+재정렬)
    query: ""  # 사용자 입력 질문 (빈 문자열로 두고 UI에서 입력 받는 경우)
    top_k: 10  # 검색 시 상위 문서 개수
    rerank: True  # 재정렬 사용 여부 (True 시 CrossEncoder 등으로 재정렬 수행)
    rerank_top_k: 5  # 재정렬 후 최종 반환할 문서 수
    # TODO: fetch_k 필요 시 사용 예정(2026.06.17 minjae)
    # fetch_k: 10

generator:  # 생성기
    model_type: "openai"  # 응답 생성 모델 타입: "openai", "huggingface", "claude", "gemini", "groq", "ollama"
    model_name: "gpt-4.1-nano"  # 사용할 모델 이름 (예: "gpt-4.1-nano", "Markr-AI/Gukbap-Qwen2.5-7B", "llama3.2")
    max_length: 512  # 생성 텍스트 최대 길이
    use_quantization: True  # huggingface 모델 로딩 시 양자화(경량화) 적용 여부(Ollama는 안 쓰지만 스키마 호환용)

chat_history: []  # 대화 히스토리 초기값 (빈 리스트로 시작)